name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true # Cancel outdated runs on new push

jobs:

  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Cache pub dependencies
        uses: actions/cache@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: dart pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Security audit
        run: dart pub audit

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: analyze  # No point testing if analysis fails

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Cache pub dependencies
        uses: actions/cache@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: dart pub get

      - name: Run unit tests
        run: dart test test/unit/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dba_test
          POSTGRES_PASSWORD: dba_test
          POSTGRES_DB: dba_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dba_test -d dba_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Cache pub dependencies
        uses: actions/cache@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: dart pub get

      - name: Install dbmate
        run: |
          sudo curl -fsSL -o /usr/local/bin/dbmate \
            https://github.com/amacneil/dbmate/releases/latest/download/dbmate-linux-amd64
          sudo chmod +x /usr/local/bin/dbmate

      - name: Run migrations
        env:
          DATABASE_URL: postgres://dba_test:dba_test@localhost:5432/dba_test?sslmode=disable
        run: dbmate up

      - name: Seed database
        env:
          DATABASE_URL: postgres://dba_test:dba_test@localhost:5432/dba_test?sslmode=disable
        run: dart run bin/db_seed.dart

      - name: Generate RSA keys
        run: |
          mkdir -p keys
          openssl genrsa -out keys/private.pem 2048
          openssl rsa -in keys/private.pem -pubout -out keys/public.pem

      - name: Run integration tests
        env:
          DATABASE_URL: postgres://dba_test:dba_test@localhost:5432/dba_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          NATS_URL: ""
          JWT_PRIVATE_KEY_PATH: keys/private.pem
          JWT_PUBLIC_KEY_PATH: keys/public.pem
          JWT_ACCESS_TOKEN_EXPIRY: "3600"
          JWT_REFRESH_TOKEN_EXPIRY: "2592000"
          OTEL_ENDPOINT: ""
          ENVIRONMENT: test
        run: |
          dart test test/integration/ \
            --reporter=github \
            --timeout=30s
