  </g>

  <!-- Glow circles top-right -->
  <ellipse cx="960" cy="160" rx="320" ry="320" fill="none" stroke="#0175C2" stroke-width="120" opacity="0.06"/>
  <ellipse cx="960" cy="160" rx="200" ry="200" fill="none" stroke="#00D2FF" stroke-width="60" opacity="0.05"/>

  <!-- Geometric decorations -->
  <polygon points="1080,480 1110,530 1050,530" fill="none" stroke="#0175C2" stroke-width="1.5" opacity="0.4"/>
  <polygon points="1130,390 1152,430 1108,430" fill="none" stroke="#00D2FF" stroke-width="1" opacity="0.3"/>
  <rect x="80" y="480" width="18" height="18" rx="3" fill="none" stroke="#0175C2" stroke-width="1.5" opacity="0.35" transform="rotate(20,89,489)"/>
  <rect x="110" y="510" width="10" height="10" rx="2" fill="none" stroke="#00D2FF" stroke-width="1" opacity="0.25" transform="rotate(10,115,515)"/>
  <circle cx="240" cy="560" r="5" fill="#00D2FF" opacity="0.2"/>
  <circle cx="1060" cy="580" r="3" fill="#00D2FF" opacity="0.25"/>
  <circle cx="1100" cy="560" r="6" fill="#0175C2" opacity="0.2"/>
  <circle cx="140" cy="540" r="3" fill="#0175C2" opacity="0.3"/>

