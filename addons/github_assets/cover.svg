    <line x1="860" y1="435" x2="880" y2="415" stroke="#00D2FF" stroke-width="0.8"/>
    <line x1="880" y1="415" x2="900" y2="440" stroke="#00D2FF" stroke-width="0.8"/>
    <line x1="820" y1="420" x2="860" y2="435" stroke="#1E3A5F" stroke-width="0.5"/>
    <line x1="840" y1="400" x2="880" y2="415" stroke="#1E3A5F" stroke-width="0.5"/>
